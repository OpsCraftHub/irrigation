name: Build and Release Firmware

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'platformio.ini'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Bump version in Config.h
        id: version
        run: |
          # Extract current version
          CURRENT_VERSION=$(grep '#define VERSION' include/Config.h | sed 's/.*"\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"

          # Update Config.h (locally only, don't commit yet)
          sed -i "s/#define VERSION \".*\"/#define VERSION \"$NEW_VERSION\"/" include/Config.h

          # Output for later steps
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version to: $NEW_VERSION"

      - name: Clean and build Board A (ESP32)
        run: |
          pio run --target clean --environment board_a
          pio run --environment board_a

      - name: Clean and build Board B (ESP32-C3)
        run: |
          pio run --target clean --environment board_b_c3
          pio run --environment board_b_c3

      - name: Prepare firmware artifacts
        run: |
          mkdir -p firmware/board_a firmware/board_b_c3
          cp .pio/build/board_a/firmware.bin firmware/board_a/firmware.bin
          echo "${{ steps.version.outputs.version }}" > firmware/board_a/version.txt
          cp .pio/build/board_b_c3/firmware.bin firmware/board_b_c3/firmware.bin
          echo "${{ steps.version.outputs.version }}" > firmware/board_b_c3/version.txt

          # Legacy paths for devices running pre-update firmware
          cp firmware/board_a/firmware.bin firmware/firmware.bin
          cp firmware/board_a/version.txt firmware/version.txt

      - name: Check for changes and commit everything together
        id: check_changes
        run: |
          # Stage all changes
          git add include/Config.h firmware/board_a/ firmware/board_b_c3/ firmware/firmware.bin firmware/version.txt

          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Release v${{ steps.version.outputs.version }} [skip ci]"
            git push
            echo "Committed and pushed version ${{ steps.version.outputs.version }}"
          fi

      - name: Create GitHub Release
        if: steps.check_changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            Automated firmware build for version ${{ steps.version.outputs.version }}

            ## OTA Update
            This firmware can be installed via OTA update on your ESP32 device.

            ## Files
            - `firmware/board_a/firmware.bin` - Board A (ESP32) firmware
            - `firmware/board_b_c3/firmware.bin` - Board B (ESP32-C3) firmware
            - `firmware/firmware.bin` - Legacy path (Board A copy)
          files: |
            firmware/board_a/firmware.bin
            firmware/board_a/version.txt
            firmware/board_b_c3/firmware.bin
            firmware/board_b_c3/version.txt
            firmware/firmware.bin
            firmware/version.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
